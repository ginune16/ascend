<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Nunito',sans-serif;font-weight:800;background:#07070f;color:#fff;font-size:18px}
:root{
  --bg:#07070f;--panel:#0f0f1e;--bdr:#1a1a32;
  --green:#58cc02;--gdark:#46a302;
  --gold:#ffc800;--red:#ff4b4b;--blue:#1cb0f6;
  --purple:#ce82ff;--orange:#ff9600;
  --dim:#3a3a5a;--dim2:#1e1e38;
}
#app{height:100vh;height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
.topbar{background:var(--bg);border-bottom:3px solid var(--bdr);display:flex;align-items:center;padding:12px 14px;gap:8px;flex-shrink:0}
.lv-badge{background:var(--green);border-radius:100px;padding:5px 18px;font-size:22px;font-weight:900;box-shadow:0 4px 0 var(--gdark)}
.tb-stat{display:flex;align-items:center;gap:6px;flex:1;justify-content:center}
.tb-stat:last-child{justify-content:flex-end}
.tb-ico{font-size:28px;line-height:1;display:inline-block}
.tb-num{font-size:24px;font-weight:900}
.xpbar{background:var(--bg);border-bottom:3px solid var(--bdr);display:flex;align-items:center;gap:12px;padding:9px 14px;flex-shrink:0}
.xp-lbl{font-size:19px;color:var(--gold);white-space:nowrap}
.xp-track{flex:1;height:20px;background:var(--bdr);border-radius:100px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,#ffc800,#e89000);border-radius:100px;transition:width .7s ease}
.zone-banner{margin:14px;background:var(--green);border-radius:22px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 6px 0 var(--gdark)}
.zb-sub{font-size:16px;opacity:.85;text-transform:uppercase;letter-spacing:2px}
.zb-name{font-size:24px;font-weight:900;margin-top:3px}
.zb-btn{background:rgba(0,0,0,.2);border:none;border-radius:12px;padding:10px 14px;font-size:24px;color:#fff;cursor:pointer}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.tab{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0}
.tab.active{display:flex}
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.pad{padding:20px}
.path-scroll{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;-webkit-overflow-scrolling:touch}
.path-inner{position:relative;width:100%}
.node{position:absolute;display:flex;align-items:center;justify-content:center;border-radius:50%;cursor:pointer;user-select:none;font-size:34px;transform:translate(-50%,-50%)}
.node.done{background:var(--green);box-shadow:0 6px 0 var(--gdark)}
.node.current{background:var(--green);box-shadow:0 6px 0 var(--gdark),0 0 45px rgba(88,204,2,.65);border:4px solid rgba(255,255,255,.22);animation:pulse-node 1.6s ease-in-out infinite}
.node.locked{background:var(--dim2);box-shadow:0 5px 0 #111122;opacity:.58;cursor:not-allowed}
.node.boss{background:linear-gradient(135deg,#cc0044,#880022);box-shadow:0 6px 0 #550010,0 0 25px rgba(200,0,68,.4)}
.node.chest{border-radius:22px;background:linear-gradient(135deg,#a06000,#c88020);box-shadow:0 6px 0 #7a4800}
.node-lbl{position:absolute;bottom:-34px;font-size:17px;text-align:center;width:120px;left:50%;transform:translateX(-50%);pointer-events:none;white-space:nowrap}
.check-badge{position:absolute;top:-7px;right:-7px;width:28px;height:28px;border-radius:50%;background:#fff;color:var(--green);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;border:3px solid var(--green)}
.hero-wrap{position:absolute;pointer-events:none;z-index:5;transform:translate(-50%,-100%);animation:bob 2.2s ease-in-out infinite}
.bnav{background:var(--panel);border-top:3px solid var(--bdr);display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 12px;cursor:pointer;border:none;background:none;color:var(--dim);font-family:'Nunito',sans-serif;font-weight:800;gap:4px;font-size:15px}
.nb.on{color:var(--blue)}
.nb-ico{font-size:26px;line-height:1}
.section-title{font-size:28px;font-weight:900;margin-bottom:20px}
.quest-card{background:var(--panel);border:3px solid var(--bdr);border-radius:22px;padding:18px;margin-bottom:16px}
.quest-head{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.quest-ico{font-size:34px}
.quest-name{font-size:21px;font-weight:900}
.quest-reward{font-size:18px;color:var(--gold)}
.quest-desc{font-size:19px;color:#8888aa;margin-bottom:12px;line-height:1.5}
.quest-row{display:flex;align-items:center;gap:12px}
.quest-track{flex:1;height:18px;background:var(--bdr);border-radius:100px;overflow:hidden}
.quest-fill{height:100%;border-radius:100px}
.quest-num{font-size:19px;min-width:84px;text-align:right}
.lb-row{background:var(--panel);border:3px solid var(--bdr);border-radius:22px;padding:16px;margin-bottom:14px;display:flex;align-items:center;gap:14px}
.lb-row.me{border-color:var(--gold);background:#1a1400}
.lb-rank{font-size:28px;width:44px;text-align:center}
.lb-av{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px}
.lb-name{flex:1;font-size:21px;font-weight:900}
.lb-xp{font-size:21px;color:var(--gold)}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.stat-card{background:var(--panel);border:3px solid var(--bdr);border-radius:22px;padding:18px;display:flex;flex-direction:column;align-items:center;gap:10px}
.stat-ring-wrap{position:relative;width:100px;height:100px}
.stat-ring-wrap svg{width:100px;height:100px}
.stat-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900}
.stat-name{font-size:19px;font-weight:900}
.trophy-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.trophy-card{background:var(--panel);border:3px solid var(--bdr);border-radius:22px;padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:7px;text-align:center}
.trophy-card.got{border-color:var(--gold)}
.trophy-ico{font-size:40px;filter:grayscale(1) opacity(.25)}
.trophy-card.got .trophy-ico{filter:none}
.trophy-name{font-size:14px;font-weight:900}
.profile-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;padding:24px 20py}
.profile-card{background:var(--panel);border:3px solid var(--bdr);border-radius:22px;width:100%;padding:18px}
.profile-row{display:flex;align-items:center;gap:14px;font-size:21px;padding:10px 0}
.profile-row+.profile-row{border-top:2px solid var(--bdr)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.on{opacity:1;pointer-events:all}
.modal{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(110%);width:100%;max-width:480px;background:var(--panel);border-radius:30px 30px 0 0;border-top:3px solid var(--bdr);padding:20px 20px 52px;z-index:201;transition:transform .38s ease}
.modal.on{transform:translateX(-50%) translateY(0)}
.modal-handle{width:50px;height:5px;background:var(--bdr);border-radius:100px;margin:0 auto 22px}
.modal-head{display:flex;align-items:center;gap:18px;margin-bottom:18px}
.modal-icon-wrap{width:78px;height:78px;border-radius:50%;background:var(--green);box-shadow:0 6px 0 var(--gdark);display:flex;align-items:center;justify-content:center;font-size:38px}
.modal-title{font-size:26px;font-weight:900}
.modal-reward{font-size:20px;color:var(--gold);margin-top:4px}
.modal-desc{font-size:21px;color:#8888aa;margin-bottom:26px;line-height:1.55}
.start-btn{width:100%;padding:22px;background:var(--green);box-shadow:0 7px 0 var(--gdark);border:none;border-radius:22px;color:#fff;font-size:24px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif}
.toast{position:fixed;top:88px;left:50%;transform:translateX(-50%);background:#1a1a2e;border:3px solid var(--green);border-radius:20px;padding:14px 26px;font-size:21px;font-weight:900;z-index:999;box-shadow:0 8px 32px rgba(0,0,0,.7);max-width:360px;text-align:center;pointer-events:none}
.particle{position:absolute;font-size:20px;pointer-events:none;z-index:20}
@keyframes bob{0%,100%{transform:translate(-50%,-100%) translateY(0)}50%{transform:translate(-50%,-100%) translateY(-13px)}}
@keyframes blink{0%,86%,100%{transform:scaleY(1)}91%,95%{transform:scaleY(.06)}93%{transform:scaleY(1)}}
@keyframes pulse-node{0%,100%{box-shadow:0 6px 0 var(--gdark),0 0 35px rgba(88,204,2,.45)}50%{box-shadow:0 6px 0 var(--gdark),0 0 65px rgba(88,204,2,.85)}}
@keyframes popIn{0%{transform:scale(0);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes xpPop{0%{transform:scale(1)}35%{transform:scale(1.5);color:var(--gold)}100%{transform:scale(1)}}
@keyframes streakFlame{0%,100%{transform:scaleY(1) rotate(-4deg)}50%{transform:scaleY(1.18) rotate(4deg)}}
@keyframes heartPulse{0%,100%{transform:scale(1)}30%{transform:scale(1.3)}60%{transform:scale(.9)}}
@keyframes pathShimmer{0%{stroke-dashoffset:0}100%{stroke-dashoffset:-40}}
@keyframes particleAnim{0%{opacity:1}100%{opacity:0}}
</style>
</head>

/* âââ MASCOT (string concat, no nested template literals) âââ */
function mascotSVG(sz, victory) {
  if (!victory) victory = false;
  var h = Math.round(sz * 160 / 120);
  var armLx = victory ? 16 : 18;
  var armLy = victory ? 96 : 117;
  var armLr = victory ? 'rotate(-55 16 96)' : 'rotate(-22 18 117)';
  var armRx = victory ? 104 : 102;
  var armRy = victory ? 96 : 113;
  var armRr = victory ? 'rotate(55 104 96)' : 'rotate(22 102 113)';

  var browL = victory ? 'M 20 44 Q 36 36 54 42' : 'M 20 46 L 54 53';
  var browR = victory ? 'M 66 42 Q 84 36 100 44' : 'M 66 53 L 100 46';
  var beak  = victory ? 'M 46 82 Q 60 96 74 82'  : 'M 46 82 Q 60 91 74 82';
  var blink = 'transform-box:fill-box;transform-origin:center;animation:blink 4.5s ease-in-out infinite';

  var dumbbell = victory ? '' :
    '<g transform="translate(103,102) rotate(28)">' +
      '<rect x="-11" y="-2.5" width="22" height="5" rx="2.5" fill="#aaaacc"/>' +
      '<rect x="-14" y="-7.5" width="7" height="15" rx="3.5" fill="#8888aa"/>' +
      '<rect x="7" y="-7.5" width="7" height="15" rx="3.5" fill="#8888aa"/>' +

  var stars = victory ?
    '<text x="6"  y="62" font-size="18">â­</text>' +

  return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" width="' + sz + '" height="' + h + '">' +
    '<ellipse cx="60" cy="158" rx="25" ry="7" fill="rgba(0,0,0,.35)"/>' +

      '<circle cx="80" cy="64" r="7"  fill="#040a1a"/>' +

function irisColor(c) { return c; } /* helper to avoid inline ternary in string concat */

/* âââ BUILD PATH âââ */
function buildPath() {
  var inner = document.getElementById('path-inner');
  if (!inner) return;
  inner.style.height = PATH_H + 'px';

  /* Remove old nodes and hero */
  var old = inner.querySelectorAll('.node,.hero-wrap');
  for (var i = 0; i < old.length; i++) old[i].parentNode.removeChild(old[i]);

  /* Use window.innerWidth capped at 480 for reliable iOS measurement */
  var W = Math.min(window.innerWidth, 480);

  var pts = [];
  for (var n = 0; n < NODES.length; n++) {
    pts.push({x: W * NODES[n].x, y: NODES[n].y});
  }

  /* Build path string segments */
  function seg(i) {
    var my = (pts[i].y + pts[i+1].y) / 2;
    return ' C ' + pts[i].x + ' ' + my + ' ' + pts[i+1].x + ' ' + my + ' ' + pts[i+1].x + ' ' + pts[i+1].y;
  }

  var gD = 'M ' + pts[0].x + ' ' + pts[0].y;
  for (var i = 0; i < CUR_IDX; i++) gD += seg(i);

  var rD = 'M ' + pts[CUR_IDX].x + ' ' + pts[CUR_IDX].y;
  for (var i = CUR_IDX; i < pts.length - 1; i++) rD += seg(i);

  /* Inject SVG into wrapper div (much more reliable than svg.innerHTML on iOS) */
  var wrap = document.getElementById('path-svg-wrap');
  wrap.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="' + W + '" height="' + PATH_H + '">' +
    '<path d="' + rD + '" stroke="#1e1e38" stroke-width="20" fill="none" stroke-linecap="round"/>' +
    '<path d="' + rD + '" stroke="#2a2a44" stroke-width="13" fill="none" stroke-linecap="round" stroke-dasharray="9 7"/>' +
    '<path d="' + gD + '" stroke="rgba(0,0,0,.4)" stroke-width="22" fill="none" stroke-linecap="round"/>' +
    '<path d="' + gD + '" stroke="#58cc02" stroke-width="14" fill="none" stroke-linecap="round"/>' +
    '<path d="' + gD + '" stroke="rgba(255,255,255,.2)" stroke-width="5" fill="none" stroke-linecap="round" stroke-dasharray="6 34" style="animation:pathShimmer 1.4s linear infinite"/>' +
  '</svg>';

  /* Create node elements */
  for (var k = 0; k < NODES.length; k++) {
    var nd = NODES[k];
    var px = pts[k].x;
    var py = nd.y;
    var sz = (nd.type === 'boss' || nd.type === 'chest') ? 90 : 82;

    var el = document.createElement('div');
    el.className = 'node ' + nd.type;
    el.style.left   = px + 'px';
    el.style.top    = py + 'px';
    el.style.width  = sz + 'px';
    el.style.height = sz + 'px';
    if (nd.type === 'chest') el.style.borderRadius = '22px';

    var html = '';
    if (nd.type === 'chest')  html = 'ð¦';
    else if (nd.type === 'locked') html = 'ð';
    else html = nd.icon;

    if (nd.type === 'done') html += '<div class="check-badge">â</div>';

    var lcolor = nd.type === 'locked' ? 'var(--dim)' :
                 nd.type === 'current' ? 'var(--green)' :
                 nd.type === 'done'    ? '#88cc44' : '#fff';
    var lshadow = nd.type === 'current' ? 'text-shadow:0 0 12px rgba(88,204,2,.7)' : '';
    var ltxt = nd.type === 'chest' ? nd.label + ' ð' : nd.label;
    html += '<div class="node-lbl" style="color:' + lcolor + ';' + lshadow + '">' + ltxt + '</div>';
    el.innerHTML = html;

    if (nd.type !== 'locked') {
      (function(node) {
        el.addEventListener('click', function() { handleNodeTap(node); });
      })(nd);
    }
    inner.appendChild(el);
  }

  /* Hero mascot */
  var hero = document.createElement('div');
  hero.className = 'hero-wrap';
  hero.style.left = pts[CUR_IDX].x + 'px';
  hero.style.top  = NODES[CUR_IDX].y + 'px';
  hero.innerHTML  = mascotSVG(88);
  inner.appendChild(hero);

  /* Scroll to current node */
  var scrollEl = document.getElementById('path-scroll');
  var target = NODES[CUR_IDX].y - Math.min(window.innerHeight / 2, 280);
  if (target < 0) target = 0;
  scrollEl.scrollTop = target;
}

/* âââ TAB SYSTEM âââ */
var statsRendered = false;

function setTab(name, btn) {
  var tabs = document.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  var btns = document.querySelectorAll('.nb');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('on');
  document.getElementById('tab-' + name).classList.add('active');
  if (btn) btn.classList.add('on');
  if (name === 'stats' && !statsRendered) { statsRendered = true; renderStats(); }
}

/* âââ RENDER CONTENT âââ */
function renderAll() {
  var medals = ['ð¥','ð¥','ð¥'];

  /* Quests */
  var qhtml = '<div class="section-title" style="color:var(--gold)">âï¸ Active Quests</div>';
  for (var i = 0; i < QUESTS.length; i++) {
    var q = QUESTS[i];
    var pct = Math.min(100, (q.prog / q.total) * 100);
    var txt = q.unit ? q.prog + '/' + q.total + ' ' + q.unit : q.prog + '/' + q.total;
    qhtml += '<div class="quest-card">' +
      '<div class="quest-head"><span class="quest-ico">' + q.icon + '</span>' +
      '<div><div class="quest-name">' + q.name + '</div><div class="quest-reward">ð ' + q.reward + '</div></div></div>' +
      '<div class="quest-desc">' + q.desc + '</div>' +
      '<div class="quest-row"><div class="quest-track"><div class="quest-fill" style="width:' + pct + '%;background:' + q.col + '"></div></div>' +
      '<span class="quest-num">' + txt + '</span></div>' +
      '</div>';
  }
  document.getElementById('quests-content').innerHTML = qhtml;

  /* League */
  var lhtml = '<div class="section-title" style="color:var(--purple)">ð League This Week</div>';
  for (var i = 0; i < LB.length; i++) {
    var p = LB[i];
    var rank = medals[i] || '#' + (i + 1);
    var meClass = p.me ? ' me' : '';
    var meTxt = p.me ? ' (You)' : '';
    var avBg = p.me ? 'var(--gold)' : 'var(--dim2)';
    lhtml += '<div class="lb-row' + meClass + '">' +
      '<div class="lb-rank">' + rank + '</div>' +
      '<div class="lb-av" style="background:' + avBg + '">' + p.e + '</div>' +
      '<div class="lb-name">' + p.name + meTxt + '</div>' +
      '<div class="lb-xp">ð ' + p.xp + '</div>' +
      '</div>';
  }
  document.getElementById('league-content').innerHTML = lhtml;

  /* Profile */
  var prows = [
    ['ð¥', G.streak + '-day streak', 'var(--orange)'],
    ['ð', G.xp + ' total XP',       'var(--blue)'],
    ['âï¸', 'Level ' + G.level + ' Warrior', 'var(--gold)'],
    ['â¤ï¸', G.hearts + '/' + G.maxH + ' HP', 'var(--red)']
  ];
  var phtml = '<div class="profile-wrap">' +
    '<div style="font-size:30px;font-weight:900;color:var(--green)">âï¸ HERO</div>' +
    mascotSVG(130) +
    '<div class="profile-card">';
  for (var i = 0; i < prows.length; i++) {
    phtml += '<div class="profile-row"><span style="font-size:30px">' + prows[i][0] + '</span>' +
      '<span style="font-size:22px;color:' + prows[i][2] + '">' + prows[i][1] + '</span></div>';
  }
  phtml += '</div></div>';
  document.getElementById('profile-content').innerHTML = phtml;
}

/* âââ STATS âââ */
function renderStats() {
  var defs = [
    {k:'STR', col:'#ff4b4b', lbl:'STRENGTH',  ico:'ðª'},
    {k:'AGI', col:'#58cc02', lbl:'AGILITY',   ico:'ð'},
    {k:'VIT', col:'#1cb0f6', lbl:'VITALITY',  ico:'â¤ï¸'},
    {k:'DISC',col:'#ce82ff', lbl:'DISCIPLINE',ico:'ð¯'}
  ];
  var r = 42;
  var circ = 2 * Math.PI * r;

  var shtml = '<div class="section-title" style="color:var(--blue)">ð Your Stats</div><div class="stats-grid">';
  for (var i = 0; i < defs.length; i++) {
    var d = defs[i];
    shtml += '<div class="stat-card">' +
      '<div class="stat-ring-wrap">' +
        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">' +
          '<circle cx="50" cy="50" r="' + r + '" fill="none" stroke="var(--bdr)" stroke-width="9"/>' +
          '<circle id="ring-' + d.k + '" cx="50" cy="50" r="' + r + '" fill="none"' +
            ' stroke="' + d.col + '" stroke-width="9"' +
            ' stroke-dasharray="' + circ + ' ' + circ + '"' +
            ' stroke-dashoffset="' + circ + '"' +
            ' stroke-linecap="round" transform="rotate(-90 50 50)"' +
            ' style="transition:stroke-dashoffset 1.1s ease"/>' +
        '</svg>' +
        '<div class="stat-num" style="color:' + d.col + '">' + G.stats[d.k] + '</div>' +
      '</div>' +
      '<div class="stat-name">' + d.ico + ' ' + d.lbl + '</div>' +
    '</div>';
  }
  shtml += '</div><div style="font-size:24px;font-weight:900;color:var(--gold);margin-bottom:16px">ð Achievements</div><div class="trophy-grid">';
  for (var i = 0; i < TROPHIES.length; i++) {
    var t = TROPHIES[i];
    shtml += '<div class="trophy-card' + (t.g ? ' got' : '') + '">' +
      '<span class="trophy-ico">' + t.i + '</span>' +
      '<span class="trophy-name">' + t.n + '</span>' +
    '</div>';
  }
  shtml += '</div>';
  document.getElementById('stats-content').innerHTML = shtml;

  /* Animate rings */
  setTimeout(function() {
    for (var i = 0; i < defs.length; i++) {
      var ring = document.getElementById('ring-' + defs[i].k);
      if (ring) ring.setAttribute('stroke-dashoffset', circ - (G.stats[defs[i].k] / 100) * circ);
    }
  }, 60);
}

/* âââ INTERACTIONS âââ */
var activeNode = null;

function handleNodeTap(node) {
  if (node.type === 'chest') {
    gainXP(100);
    showToast('ð¦ Milestone opened! +100 XP');
    return;
  }
  activeNode = node;
  document.getElementById('modal-icon').textContent  = node.icon || 'ðª';
  document.getElementById('modal-title').textContent = node.label;
  document.getElementById('modal-reward').textContent = 'ð ' + node.reward;
  document.getElementById('modal-desc').textContent  = node.desc;
  document.getElementById('overlay').classList.add('on');
  document.getElementById('modal').classList.add('on');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('on');
  document.getElementById('modal').classList.remove('on');
  activeNode = null;
}

function startWorkout() {
  if (!activeNode) return;
  var node = activeNode;
  closeModal();
  var xp = parseInt(node.reward) || 75;
  gainXP(xp);
  showToast('ð ' + node.label + ' complete! +' + xp + ' XP');
}

function gainXP(amount) {
  G.xp = Math.min(G.xpNext, G.xp + amount);
  document.getElementById('xp-num').textContent = G.xp;
  document.getElementById('xp-fill').style.width = Math.min(100, (G.xp / G.xpNext) * 100) + '%';
  document.getElementById('xp-lbl').textContent = 'â¡ ' + G.xp + ' / ' + G.xpNext + ' XP';
}

function showToast(msg) {
  var host = document.getElementById('toast-host');
  var el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  host.innerHTML = '';
  host.appendChild(el);
  setTimeout(function() {
    el.style.transition = 'opacity .4s';
    el.style.opacity = '0';
    setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 400);
  }, 2600);
}

/* âââ RESIZE âââ */
var resizeTimer;
window.addEventListener('resize', function() {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(buildPath, 250);
});

/* âââ INIT âââ */
window.addEventListener('load', function() {
  try {
    renderAll();
  } catch(e) {
    console.error('renderAll error:', e);
  }
  setTimeout(function() {
    try {
      buildPath();
    } catch(e) {
      console.error('buildPath error:', e);
    }
  }, 120);
});
</script>
